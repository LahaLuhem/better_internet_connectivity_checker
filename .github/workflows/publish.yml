name: Publish to pub.dev

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+' # tag-pattern on pub.dev: '{{version}}'

# Inlined instead of using dart-lang/setup-dart/.github/workflows/publish.yml@v1.
# That reusable workflow runs plain `dart pub get` (no `--no-example` flag) at
# the package root, which transitively resolves `example/` against CI's Flutter
# SDK — different from the `.fvmrc`-pinned local Flutter used by
# scripts/release.sh, so the resolution rewrites `example/pubspec.lock`. The
# next step (`dart pub publish --dry-run`) then trips its "checked-in files are
# modified" guard. `--no-example` keeps the committed lockfile byte-identical.
# See AGENTS.md hard rule #6 for the original observation about pub resolving
# example by default.
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC auth to pub.dev (handled by dart-lang/setup-dart).
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
      - name: Install dependencies (root only — skip example/)
        run: dart pub get --no-example
      - name: Publish dry-run
        run: dart pub publish --dry-run
      - name: Publish to pub.dev
        run: dart pub publish --force
