name: Package checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Pull-request runs cancel each other per PR; main-branch runs cancel only
  # against later main commits. The `|| github.ref` fallback keeps the group
  # well-formed on push events where `pull_request.number` is empty.
  group: pkg-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Dart analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dart
      - run: dart --no-version-check analyze lib test benchmark

  deps:
    name: Dependency validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dart
      - run: dart pub global activate dependency_validator
      - run: dart pub global run dependency_validator

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dart
      - run: dart pub global activate coverage
      - run: dart test --coverage=coverage
      - name: Format coverage as lcov
        run: |
          dart pub global run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --report-on=lib \
            --packages=.dart_tool/package_config.json \
            -o coverage/lcov.info
      # Strip smoke-only files from the report BEFORE upload + gate, so both
      # Coveralls and the threshold see the same in-scope surface. Mirrors the
      # principle in `benchmark/python/pyproject.toml`'s `[tool.coverage.run]
      # omit`: a file that can't be unit-tested cleanly (`printing_connectivity_observer`
      # is a pure `dart:developer.log` delegation with no test seam) shouldn't
      # contribute to either side of the ratio. Each file omitted carries a
      # block comment at the top of the file explaining why. Append new globs
      # here when adding another smoke-only file.
      - name: Strip smoke-only files from coverage
        run: |
          lcov --remove coverage/lcov.info \
            '*/printing_connectivity_observer.dart' \
            --output-file coverage/lcov.info
      # Upload BEFORE the gate so the coverage badge updates and PR comments
      # land even when the gate would fail. Coveralls auto-routes based on
      # event context (PR vs. push to main).
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info
          format: lcov
      - name: Enforce min coverage (95%)
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 95
